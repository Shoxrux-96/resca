services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: restouser
      POSTGRES_PASSWORD: restopass
      POSTGRES_DB: restocrm
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restouser -d restocrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://restouser:restopass@db:5432/restocrm
      PUBLIC_URL: "https://discussions-lone-broadway-brakes.trycloudflare.com"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: artifacts/pos-crm/Dockerfile
    environment:
      BASE_PATH: "/"
      PORT: "3000"
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
